<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>학생 그림 펀딩 플랫폼</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f7fb;margin:0}
header{background:#4f46e5;color:#fff;padding:16px;position:sticky;top:0}
.container{max-width:1200px;margin:auto;padding:16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:768px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card img{width:100%;aspect-ratio:1/1;object-fit:cover}
.info{padding:12px}
button{background:#4f46e5;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer}
.rank{background:#fff;padding:12px;border-radius:12px;margin-bottom:16px}
</style>
</head>
<body>
<header>
<div class="top">
<h2>🎨 학생 그림 펀딩 플랫폼</h2>
</div>
</header>

<div class="container">
<div class="rank">
<h3>🏆 TOP 3</h3>
<div id="top3"></div>
</div>
<div id="gallery" class="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, doc, updateDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"AIzaSyCz12idSMrOXQaVeUoIlGN4lOxgBovtsXQ",
 authDomain:"classvoting-a0e95.firebaseapp.com",
 projectId:"classvoting-a0e95",
 storageBucket:"classvoting-a0e95.firebasestorage.app",
 messagingSenderId:"384140463404",
 appId:"1:384140463404:web:44cd9553316a622f4d3089",
 measurementId:"G-14JV67N5V0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function renderCard(id,data){
 return `
 <div class="card">
 <img src="${data.image || 'https://github.com/cartist777/Voting/blob/c1ad0c80be55a5e17b4407bbacaf17f5dbb1210f/images/default.jpg'}">
 <div class="info">
 <h4>${data.title||('작품 '+id)}</h4>
 <div>${data.student||''}</div>
 <p>${data.description||''}</p>
 <b>💰 ${data.funding||0} 코인</b><br><br>
 <button onclick="fund('${id}',10)">10코인</button>
 <button onclick="fund('${id}',20)">20코인</button>
 <button onclick="fund('${id}',50)">50코인</button>
 </div>
 </div>`;
}


window.fund = async(id,amount)=>{
 // 로그인 제거했으므로 코인 차감 없이 펀딩만 증가
 await updateDoc(doc(db,"artworks",id),{funding:increment(amount)});
 alert(amount+" 코인 펀딩 완료!");
};

onSnapshot(collection(db,"artworks"),(snap)=>{
 let html="";
 let ranking=[];

 snap.forEach(d=>{
   const data=d.data();
   html+=renderCard(d.id,data);
   ranking.push({...data,id:d.id});
 });

 gallery.innerHTML=html;

 ranking.sort((a,b)=>(b.funding||0)-(a.funding||0));

 top3.innerHTML=ranking.slice(0,3)
 .map((x,i)=>`${i+1}위 ${x.title} (${x.funding||0}코인)`)
 .join("<br>");
});
</script>
</body>
</html>
